<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - عيادة د. محمد برهان</title>
    
    <!-- FIREBASE LIBRARIES (Required for Login) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        :root { --primary: #003459; --accent: #0077b6; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--primary); 
            margin: 0; display: flex; justify-content: center; 
            align-items: center; height: 100vh; direction: rtl;
        }
        .login-card { 
            background: white; padding: 40px; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            width: 90%; max-width: 400px; text-align: center; 
        }
        h2 { color: var(--primary); margin-bottom: 30px; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid #f1f5f9; border-radius: 12px; 
            box-sizing: border-box; font-size: 1rem; outline: none;
        }
        input:focus { border-color: var(--accent); }
        .btn-login { 
            background: var(--accent); color: white; border: none; 
            padding: 18px; width: 100%; border-radius: 12px; 
            font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1rem;
        }
        .footer-text { margin-top: 20px; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>دخول الكادر الطبي</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="btn-login" id="loginBtn" onclick="login()">دخول للمنظومة</button>
        <p class="footer-text">نظام إدارة العيادة الذكي v1.0</p>
    </div>

    <script>
        // 1. YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDqMEr5yKTjN3GV5osJmwW_2hdKVQOzFWs",
            authDomain: "dentalclinicbooking-system.firebaseapp.com",
            projectId: "dentalclinicbooking-system",
            storageBucket: "dentalclinicbooking-system.firebasestorage.app",
            messagingSenderId: "892853005967",
            appId: "1:892853005967:web:1a5fb182c073eba1ee0afa"
        };
        firebase.initializeApp(firebaseConfig);

        // 2. AUTO-REDIRECT (If already logged in, go to dashboard)
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                console.log("User already logged in, redirecting...");
                window.location.href = "index.html";
            }
        });

        // 3. LOGIN FUNCTION
        function login() {
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("يرجى إدخال البريد الإلكتروني وكلمة المرور");
                return;
            }

            btn.innerText = "جاري التحقق...";
            btn.disabled = true;

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => {
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    btn.innerText = "دخول للمنظومة";
                    btn.disabled = false;
                    alert("خطأ في الدخول: " + error.message);
                });
        }

        // 4. ENTER KEY SUPPORT
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
